<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>처리함 — 담당 합의 · 백업 검토 · 재평가 · Approval</title>
  <style>
    :root {
      --bg: #f4f5f7;
      --me: #2563eb;
      --org: #ffffff;
      --ink: #1f2933;
      --muted: #6b7280;
      --line: #e5e7eb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo",
        "Malgun Gothic", sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }
    .inbox {
      width: 100%;
      max-width: 640px;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      background: var(--bg);
    }
    header {
      padding: 16px 20px;
      font-weight: 700;
      font-size: 16px;
      border-bottom: 1px solid var(--line);
      background: #fff;
    }
    header small { display: block; font-weight: 400; color: var(--muted); margin-top: 2px; }
    .whoami {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      background: #fff;
      font-size: 14px;
    }
    .whoami label { color: var(--muted); }
    .demo-note { font-size: 11px; color: var(--muted); margin-left: auto; text-align: right; }
    .tabs {
      display: flex;
      gap: 4px;
      padding: 0 16px;
      background: #fff;
      border-bottom: 1px solid var(--line);
    }
    .tab {
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 600;
      color: var(--muted);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      border-radius: 0;
      cursor: pointer;
    }
    .tab:hover { color: var(--ink); }
    .tab.active { color: var(--me); border-bottom-color: var(--me); }
    .tab .count {
      display: inline-block;
      margin-left: 6px;
      padding: 0 7px;
      border-radius: 999px;
      background: #fee2e2;
      color: #b91c1c;
      font-size: 11px;
      font-weight: 700;
    }
    .tab .count.zero { display: none; }
    .panel { display: none; flex: 1; flex-direction: column; min-height: 0; }
    .panel.active { display: flex; }
    select {
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      font-size: 14px;
      background: #fff;
      outline: none;
    }
    select:focus { border-color: var(--me); }
    #cases, #reviews, #reevals, #approvals {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .empty {
      color: var(--muted);
      font-size: 14px;
      text-align: center;
      padding: 32px 16px;
    }
    .case {
      background: var(--org);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .case .intent {
      display: inline-block;
      align-self: flex-start;
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      background: #fef3c7;
      color: #92400e;
    }
    .case .question {
      font-size: 15px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .case .ask-label { font-size: 12px; color: var(--muted); }
    .candidates {
      display: flex;
      flex-direction: column;
      gap: 6px;
      border-top: 1px dashed var(--line);
      padding-top: 10px;
    }
    .cand {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
    }
    .cand:hover { border-color: var(--me); }
    .cand input { accent-color: var(--me); }
    .cand .who { font-weight: 600; }
    .cand .owner { color: var(--muted); font-size: 12px; }
    .cand-coverage {
      margin-top: 4px;
      margin-left: 28px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.6;
    }
    .cand-coverage .cov-summary { color: var(--ink); font-size: 12px; }
    .cand-coverage .cov-row { display: flex; gap: 4px; flex-wrap: wrap; align-items: baseline; }
    .cand-coverage .cov-label { font-weight: 600; white-space: nowrap; }
    .cand-coverage .cov-tag {
      display: inline-block;
      padding: 1px 7px;
      border-radius: 999px;
      background: #f3f4f6;
      font-size: 11px;
    }
    .rel-concepts {
      margin-top: 6px;
      margin-left: 28px;
    }
    .rel-concepts .rel-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 3px;
    }
    .rel-concept-item {
      display: flex;
      flex-direction: column;
      gap: 1px;
      padding: 4px 8px;
      border-left: 2px solid var(--line);
      margin-bottom: 4px;
      font-size: 12px;
      cursor: pointer;
    }
    .rel-concept-item:hover { border-left-color: var(--muted); }
    .rel-concept-item .rc-label { font-weight: 600; color: var(--ink); }
    .rel-concept-item .rc-cq { color: var(--muted); font-size: 11px; }
    .rel-concept-item .rc-doc {
      margin-top: 6px;
      padding: 8px;
      background: #f6f6f4;
      border-radius: 4px;
      font-size: 11px;
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--ink);
      cursor: default;
    }
    .rel-concept-item .rc-doc.loading { color: var(--muted); font-style: italic; }
    .rel-concept-item .rc-doc.unavailable { color: var(--muted); }
    .rel-concept-item .rc-doc.error { color: #b00020; }
    .rationale {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      resize: vertical;
      min-height: 38px;
    }
    .rationale:focus { border-color: var(--me); }
    .actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    button {
      padding: 9px 18px;
      border: none;
      border-radius: 999px;
      background: var(--me);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: default; }
    button.secondary { background: #fff; color: var(--ink); border: 1px solid var(--line); }
    button.secondary:hover { border-color: var(--me); color: var(--me); }
    button.ghost { background: #fff; color: var(--muted); border: 1px solid var(--line); }
    button.ghost:hover { border-color: #b91c1c; color: #b91c1c; }
    .review .badge {
      display: inline-block;
      align-self: flex-start;
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      background: #fee2e2;
      color: #b91c1c;
    }
    .review .meta { font-size: 12px; color: var(--muted); }
    .review .answer-label { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .review .answer {
      font-size: 14px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
      background: #f9fafb;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
    }
    .correct-box { display: none; flex-direction: column; gap: 6px; }
    .correct-box.open { display: flex; }
    .result { font-size: 13px; font-weight: 600; }
    .result.still_open { color: #92400e; }
    .result.agreed { color: #166534; }
    .result.deadlocked { color: #b91c1c; }
    .result.route_rejected { color: #92400e; }
    .result.error { color: #b91c1c; }
    .stance-option { display: flex; align-items: center; gap: 8px; margin-top: 10px; font-size: 13px; color: var(--muted); }
    .nav { padding: 12px 16px; font-size: 13px; }
    .nav a { color: var(--me); text-decoration: none; }
  </style>
</head>
<body>
  <div class="inbox">
    <header>
      처리함
      <small>담당 합의, 백업 검토, 재평가와 발송 전 Approval을 한곳에서 처리합니다.</small>
    </header>
    <!-- 가장 드롭다운 제거(ADR 0009 기준 3·ADR 0016) — 인증된 본인 신원으로 세션 고정.
         로그인 전: 로그인 폼 / 로그인 후: 신원 표시 + 로그아웃. per-request 가장 불가. -->
    <div class="whoami">
      <div id="login-form">
        <label for="login-user">로그인</label>
        <input id="login-user" type="text" placeholder="user_id (예: cs_lead)" autocomplete="off" />
        <button id="login-btn">로그인</button>
        <span class="demo-note">인증된 본인 신원으로 세션 고정(가장 불가). 데모 기동: <code>OPERATOR_SESSION_SECRET</code> 설정 후 uvicorn.</span>
      </div>
      <div id="identity" style="display:none">
        <span>로그인: <strong id="me-name"></strong></span>
        <button id="logout-btn" class="ghost">로그아웃</button>
      </div>
    </div>
    <div class="tabs" role="tablist" aria-label="처리함 탭">
      <button class="tab active" data-tab="cases" id="tab-cases" role="tab" aria-selected="true" aria-controls="panel-cases">담당 합의</button>
      <button class="tab" data-tab="reviews" id="tab-reviews" role="tab" aria-selected="false" aria-controls="panel-reviews" tabindex="-1">
        백업 검토<span class="count zero" id="review-count">0</span>
      </button>
      <button class="tab" data-tab="reevals" id="tab-reevals" role="tab" aria-selected="false" aria-controls="panel-reevals" tabindex="-1">재평가</button>
      <button class="tab" data-tab="approvals" id="tab-approvals" role="tab" aria-selected="false" aria-controls="panel-approvals" tabindex="-1">
        Approval<span class="count zero" id="approval-count">0</span>
      </button>
    </div>
    <div class="panel active" id="panel-cases" role="tabpanel" aria-labelledby="tab-cases" aria-hidden="false">
      <div id="cases"></div>
    </div>
    <div class="panel" id="panel-reviews" role="tabpanel" aria-labelledby="tab-reviews" aria-hidden="true">
      <div id="reviews"></div>
    </div>
    <div class="panel" id="panel-reevals" role="tabpanel" aria-labelledby="tab-reevals" aria-hidden="true">
      <div id="reevals"></div>
    </div>
    <div class="panel" id="panel-approvals" role="tabpanel" aria-labelledby="tab-approvals" aria-hidden="true">
      <div id="approvals"></div>
    </div>
    <div class="nav"><a href="/">← 채팅으로</a></div>
  </div>

  <script>
    const casesEl = document.getElementById("cases");
    const reviewsEl = document.getElementById("reviews");
    const reevalsEl = document.getElementById("reevals");
    const approvalsEl = document.getElementById("approvals");
    const reviewCountEl = document.getElementById("review-count");
    const approvalCountEl = document.getElementById("approval-count");
    const loginForm = document.getElementById("login-form");
    const identityBox = document.getElementById("identity");
    const meNameEl = document.getElementById("me-name");

    function el(tag, cls, text) {
      const node = document.createElement(tag);
      if (cls) node.className = cls;
      if (text != null) node.textContent = text;
      return node;
    }

    // 세션 신원 — 로그인 성공 시 채워진다. 운영 면 조회/처분은 *세션*이 신원을
    // 결정하므로(서버 강제) 클라이언트는 표시용으로만 들고, 요청 바디엔 안 싣는다.
    let sessionUser = null;
    let approvalLoadEpoch = 0;
    let approvalDetailRequest = 0;
    let activeApprovalDetailClose = null;

    function beginApprovalLoadGeneration() {
      approvalLoadEpoch += 1;
      approvalDetailRequest += 1;
      const closeActive = activeApprovalDetailClose;
      activeApprovalDetailClose = null;
      if (closeActive) closeActive();
      approvalsEl.textContent = "";
      approvalCountEl.textContent = "0";
      approvalCountEl.classList.add("zero");
      return approvalLoadEpoch;
    }

    // ── 탭 전환 ──────────────────────────────────────────────────────────
    let activeTab = "cases";
    function selectTab(name) {
      activeTab = name;
      for (const t of document.querySelectorAll(".tab")) {
        const selected = t.dataset.tab === name;
        t.classList.toggle("active", selected);
        t.setAttribute("aria-selected", String(selected));
        t.tabIndex = selected ? 0 : -1;
      }
      for (const p of document.querySelectorAll(".panel")) {
        const selected = p.id === "panel-" + name;
        p.classList.toggle("active", selected);
        p.setAttribute("aria-hidden", String(!selected));
      }
    }
    for (const t of document.querySelectorAll(".tab")) {
      t.addEventListener("click", () => selectTab(t.dataset.tab));
      t.addEventListener("keydown", (event) => {
        if (event.key !== "ArrowLeft" && event.key !== "ArrowRight") return;
        event.preventDefault();
        const tabs = Array.from(document.querySelectorAll(".tab"));
        const current = tabs.indexOf(t);
        const step = event.key === "ArrowRight" ? 1 : -1;
        const next = tabs[(current + step + tabs.length) % tabs.length];
        selectTab(next.dataset.tab);
        next.focus();
      });
    }

    async function fetchCases() {
      // 세션 경로 — 서버가 세션 신원의 처리함만 돌려준다(path로 남 지목 불가).
      const res = await fetch("/inbox/cases");
      if (res.status === 401) throw new Error("401");
      if (!res.ok) throw new Error("요청 실패: " + res.status);
      return res.json();
    }

    async function postConcur(caseId, body) {
      const res = await fetch("/cases/" + encodeURIComponent(caseId) + "/concur", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        const msg = data && data.detail ? data.detail : "요청 실패: " + res.status;
        throw new Error(msg);
      }
      return data;
    }

    // on-demand 문서 fetch(ADR 0028 §15) — 연관 개념 클릭 시 owner 워커에서 문서를 끌어온다.
    // 중앙은 본문을 저장하지 않고 중계만 한다(비소유). 응답: {found, available, content?, message?}.
    async function postFetchDocument(caseId, agentId, conceptId) {
      const res = await fetch("/inbox/cases/" + encodeURIComponent(caseId) + "/document", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ agent_id: agentId, concept_id: conceptId }),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        const msg = data && data.detail ? data.detail : "요청 실패: " + res.status;
        throw new Error(msg);
      }
      return data;
    }

    function renderOutcome(node, outcome) {
      node.className = "result " + outcome.type;
      if (outcome.type === "still_open") {
        const n = (outcome.pending_owners || []).length;
        node.textContent = "표 접수됨 — 아직 " + n + "명 대기 중";
      } else if (outcome.type === "agreed") {
        node.textContent = "합의됨 → " + outcome.primary + " 담당";
      } else if (outcome.type === "deadlocked") {
        node.textContent = "교착 — 매니저 처리함으로 이동했습니다";
      } else if (outcome.type === "route_rejected") {
        node.textContent = "담당 경로 재검토 필요 — 현재 라운드를 유지합니다";
      } else {
        node.textContent = "";
      }
    }

    function renderCase(c) {
      const wrap = el("div", "case");
      wrap.appendChild(el("span", "intent", c.intent));
      wrap.appendChild(el("div", "ask-label", "원문 질문"));
      wrap.appendChild(el("div", "question", c.question));
      if (c.current_round != null) {
        wrap.appendChild(el("div", "meta", "현재 라운드 " + c.current_round));
      }

      const cands = el("div", "candidates");
      const radioName = "primary_" + c.case_id;
      for (const cand of c.candidates) {
        const wrap = el("div");
        const label = el("label", "cand");
        const radio = el("input");
        radio.type = "radio";
        radio.name = radioName;
        radio.value = cand.agent_id;
        label.appendChild(radio);
        const who = el("span", "who", cand.agent_id);
        label.appendChild(who);
        label.appendChild(el("span", "owner", "(" + cand.owner + ")"));
        wrap.appendChild(label);

        if (cand.summary || (cand.domains && cand.domains.length) || (cand.knowledge_sources && cand.knowledge_sources.length)) {
          const cov = el("div", "cand-coverage");
          if (cand.summary) cov.appendChild(el("div", "cov-summary", cand.summary));
          if (cand.domains && cand.domains.length) {
            const row = el("div", "cov-row");
            row.appendChild(el("span", "cov-label", "담당:"));
            for (const d of cand.domains) row.appendChild(el("span", "cov-tag", d));
            cov.appendChild(row);
          }
          if (cand.knowledge_sources && cand.knowledge_sources.length) {
            const row = el("div", "cov-row");
            row.appendChild(el("span", "cov-label", "출처:"));
            for (const s of cand.knowledge_sources) row.appendChild(el("span", "cov-tag", s));
            cov.appendChild(row);
          }
          wrap.appendChild(cov);
        }

        if (cand.relevant_concepts && cand.relevant_concepts.length) {
          const rcWrap = el("div", "rel-concepts");
          rcWrap.appendChild(el("div", "rel-label", "연관 개념 (클릭하면 문서 펼침)"));
          for (const rc of cand.relevant_concepts) {
            const item = el("div", "rel-concept-item");
            item.dataset.conceptId = rc.id;
            item.dataset.agentId = cand.agent_id;
            item.appendChild(el("span", "rc-label", rc.label));
            item.appendChild(el("span", "rc-cq", rc.core_question));
            // 문서 본문(또는 degradation)을 펼쳐 보일 자리 — 클릭 시 lazy fetch.
            const doc = el("div", "rc-doc");
            doc.style.display = "none";
            item.appendChild(doc);
            item.addEventListener("click", async () => {
              if (doc.dataset.open === "1") {
                // 토글 닫기.
                doc.style.display = "none";
                doc.dataset.open = "0";
                return;
              }
              doc.style.display = "block";
              doc.dataset.open = "1";
              doc.className = "rc-doc loading";
              doc.textContent = "문서 추출 중…";
              try {
                const data = await postFetchDocument(c.case_id, cand.agent_id, rc.id);
                if (data.found) {
                  doc.className = "rc-doc";
                  doc.textContent = data.content;
                } else {
                  doc.className = "rc-doc unavailable";
                  doc.textContent = data.message || "추출 불가";
                }
              } catch (err) {
                doc.className = "rc-doc error";
                doc.textContent = err.message || "추출 실패";
              }
            });
            rcWrap.appendChild(item);
          }
          wrap.appendChild(rcWrap);
        }

        cands.appendChild(wrap);
      }
      wrap.appendChild(cands);

      const rationale = el("textarea", "rationale");
      rationale.placeholder = "지목 근거 (선택)";
      wrap.appendChild(rationale);

      const stanceLabel = el("label", "stance-option");
      const keepComplement = el("input");
      keepComplement.type = "checkbox";
      stanceLabel.appendChild(keepComplement);
      stanceLabel.appendChild(
        document.createTextNode("내 후보가 primary가 아니면 내 후보 지식을 보조 근거로 유지")
      );
      wrap.appendChild(stanceLabel);

      const result = el("div", "result");
      const actions = el("div", "actions");
      const btn = el("button", null, "primary로 지목");
      actions.appendChild(btn);
      actions.appendChild(result);
      wrap.appendChild(actions);

      btn.addEventListener("click", async () => {
        const picked = cands.querySelector("input:checked");
        if (!picked) {
          result.className = "result error";
          result.textContent = "지목할 후보를 선택하세요.";
          return;
        }
        btn.disabled = true;
        try {
          const outcome = await postConcur(c.case_id, {
            on_agent: picked.value,
            rationale: rationale.value.trim(),
            expected_round: c.current_round ?? null,
            stance: keepComplement.checked ? "keep_as_complement" : "withdraw",
          });
          renderOutcome(result, outcome);
          // 라운드와 종결 상태는 서버가 결정한다. 결과를 잠시 보여준 뒤 다시 읽는다.
          setTimeout(load, 1200);
        } catch (err) {
          result.className = "result error";
          result.textContent = err.message || "제출 실패";
          btn.disabled = false;
        }
      });

      return wrap;
    }

    // ── 백업 검토 탭 ──────────────────────────────────────────────────────

    async function fetchReviews() {
      const res = await fetch("/inbox/backup-reviews");
      if (res.status === 401) throw new Error("401");
      if (!res.ok) throw new Error("요청 실패: " + res.status);
      return res.json();
    }

    async function postReview(itemId, body) {
      const res = await fetch("/backup-reviews/" + encodeURIComponent(itemId), {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        const msg = data && data.detail ? data.detail : "요청 실패: " + res.status;
        throw new Error(msg);
      }
      return data;
    }

    function fmtTime(iso) {
      if (!iso) return "";
      const d = new Date(iso);
      return isNaN(d) ? iso : d.toLocaleString();
    }

    function renderReview(item) {
      const wrap = el("div", "case review");
      wrap.appendChild(el("span", "badge", "미검토 백업 답"));
      wrap.appendChild(
        el(
          "div",
          "meta",
          item.agent_id + " · 스냅샷 " + fmtTime(item.snapshot_at) + " · 답변 " + fmtTime(item.answered_at)
        )
      );
      wrap.appendChild(el("div", "ask-label", "원문 질문"));
      wrap.appendChild(el("div", "question", item.question));
      wrap.appendChild(el("div", "answer-label", "백업이 내 이름으로 낸 답"));
      wrap.appendChild(el("div", "answer", item.backup_answer_text));

      // 정정 입력(정정 버튼 누르면 펼침).
      const correctBox = el("div", "correct-box");
      const correctText = el("textarea", "rationale");
      correctText.placeholder = "정정할 답 내용";
      correctBox.appendChild(correctText);
      wrap.appendChild(correctBox);

      const result = el("div", "result");
      const actions = el("div", "actions");
      const approveBtn = el("button", null, "승인");
      const correctBtn = el("button", "secondary", "정정");
      const dismissBtn = el("button", "ghost", "무시");
      actions.appendChild(approveBtn);
      actions.appendChild(correctBtn);
      actions.appendChild(dismissBtn);
      actions.appendChild(result);
      wrap.appendChild(actions);

      function disableAll(v) {
        approveBtn.disabled = v;
        correctBtn.disabled = v;
        dismissBtn.disabled = v;
      }

      async function submit(body) {
        disableAll(true);
        try {
          const reviewed = await postReview(item.item_id, body);
          result.className = "result agreed";
          const t = reviewed.review ? reviewed.review.type : body.type;
          const label = t === "approve" ? "승인" : t === "correct" ? "정정" : "무시";
          result.textContent = "검토 완료 — " + label + ". 재조회합니다.";
          setTimeout(load, 1000);
        } catch (err) {
          result.className = "result error";
          result.textContent = err.message || "검토 실패";
          disableAll(false);
        }
      }

      approveBtn.addEventListener("click", () =>
        submit({ type: "approve" })
      );
      dismissBtn.addEventListener("click", () =>
        submit({ type: "dismiss" })
      );
      correctBtn.addEventListener("click", () => {
        if (!correctBox.classList.contains("open")) {
          // 첫 클릭: 입력칸 펼치기.
          correctBox.classList.add("open");
          correctText.focus();
          return;
        }
        const text = correctText.value.trim();
        if (!text) {
          result.className = "result error";
          result.textContent = "정정할 답 내용을 입력하세요.";
          return;
        }
        submit({ type: "correct", corrected_text: text });
      });

      return wrap;
    }

    // ── 재평가 탭 ────────────────────────────────────────────────────────

    async function fetchReevals() {
      const res = await fetch("/inbox/reeval");
      if (res.status === 401) throw new Error("401");
      if (!res.ok) throw new Error("요청 실패: " + res.status);
      return res.json();
    }

    async function loadReevals() {
      reevalsEl.textContent = "";
      let items;
      try {
        items = await fetchReevals();
      } catch (err) {
        if (err.message === "401") throw err;
        reevalsEl.appendChild(el("div", "empty", "재평가 목록을 불러오지 못했습니다."));
        return;
      }
      if (!items.length) {
        reevalsEl.appendChild(el("div", "empty", "재평가할 판례·답이 없습니다."));
        return;
      }
      for (const item of items) {
        const wrap = el("div", "case");
        wrap.appendChild(el("span", "intent", "재평가"));
        wrap.appendChild(el("div", "meta", item.subject_kind + " · " + fmtTime(item.flagged_at)));
        wrap.appendChild(el("div", "question", item.question));
        wrap.appendChild(el("div", "answer", item.reason));
        reevalsEl.appendChild(wrap);
      }
    }

    // ── Approval 탭 ──────────────────────────────────────────────────────

    async function fetchApprovals() {
      const res = await fetch("/inbox/approvals");
      if (res.status === 401) throw new Error("401");
      if (!res.ok) throw new Error("요청 실패: " + res.status);
      return res.json();
    }

    async function fetchApprovalDetail(itemId) {
      const res = await fetch("/inbox/approvals/" + encodeURIComponent(itemId));
      if (res.status === 401) throw new Error("401");
      if (!res.ok) throw new Error("Approval 상세 요청 실패: " + res.status);
      return res.json();
    }

    async function postApprovalDecision(itemId, intent) {
      const res = await fetch(
        "/inbox/approvals/" + encodeURIComponent(itemId) + "/decide",
        {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(intent),
        }
      );
      if (!res.ok) throw new Error("Approval 처분 실패: " + res.status);
    }

    async function postApprovalReassignment(itemId, approverId) {
      const res = await fetch(
        "/inbox/approvals/" + encodeURIComponent(itemId) + "/reassign",
        {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ approver_id: approverId }),
        }
      );
      if (!res.ok) throw new Error("Approval 재지정 실패: " + res.status);
    }

    function labelledInput(labelText, id, multiline) {
      const label = el("label", "ask-label", labelText);
      label.htmlFor = id;
      const input = el(multiline ? "textarea" : "input", "rationale");
      input.id = id;
      label.appendChild(input);
      return { label, input };
    }

    function renderApproval(summary, index) {
      // queue 카드에는 식별자·round·배정/기한만 둔다. 질문과 후보는 상세 클릭 뒤에만 받는다.
      const wrap = el("div", "case approval");
      wrap.appendChild(el("span", "intent", "Approval " + summary.approval_round + "라운드"));
      wrap.appendChild(el("div", "meta", summary.item_id));
      wrap.appendChild(
        el("div", "meta", "배정 " + fmtTime(summary.assigned_at) + " · 기한 " + fmtTime(summary.due_at))
      );
      const detailBox = el("div", "correct-box");
      detailBox.id = "approval-detail-" + index;
      const result = el("div", "result");
      const openBtn = el("button", "secondary", "상세 열기");
      openBtn.setAttribute("aria-expanded", "false");
      openBtn.setAttribute("aria-controls", detailBox.id);
      wrap.appendChild(openBtn);
      wrap.appendChild(detailBox);
      wrap.appendChild(result);

      function closeDetail() {
        detailBox.classList.remove("open");
        detailBox.textContent = "";
        result.className = "result";
        result.textContent = "";
        openBtn.disabled = false;
        openBtn.textContent = "상세 열기";
        openBtn.setAttribute("aria-expanded", "false");
        if (activeApprovalDetailClose === closeDetail) activeApprovalDetailClose = null;
      }

      openBtn.addEventListener("click", async () => {
        if (activeApprovalDetailClose === closeDetail) {
          approvalDetailRequest += 1;
          closeDetail();
          return;
        }
        const generation = approvalLoadEpoch;
        const detailRequest = ++approvalDetailRequest;
        if (activeApprovalDetailClose) activeApprovalDetailClose();
        activeApprovalDetailClose = closeDetail;
        openBtn.disabled = true;
        result.className = "result";
        result.textContent = "Approval 상세를 불러오는 중…";
        try {
          const detail = await fetchApprovalDetail(summary.item_id);
          if (
            generation !== approvalLoadEpoch ||
            detailRequest !== approvalDetailRequest ||
            activeApprovalDetailClose !== closeDetail
          ) return;
          detailBox.textContent = "";
          detailBox.appendChild(el("div", "ask-label", "원문 질문"));
          detailBox.appendChild(el("div", "question", detail.question));
          detailBox.appendChild(el("div", "answer-label", "승인 후보"));
          detailBox.appendChild(el("div", "answer", detail.candidate.text));

          const edit = labelledInput(
            "수정승인 답변",
            "approval-edit-" + index,
            true
          );
          edit.input.value = detail.candidate.text;
          detailBox.appendChild(edit.label);
          const reject = labelledInput(
            "Reject 사유 코드",
            "approval-reason-" + index,
            false
          );
          detailBox.appendChild(reject.label);
          const target = labelledInput(
            "새 승인자 ID",
            "approval-target-" + index,
            false
          );
          detailBox.appendChild(target.label);

          const actions = el("div", "actions");
          const approveBtn = el("button", null, "승인");
          const editBtn = el("button", "secondary", "수정승인");
          const rejectBtn = el("button", "ghost", "Reject");
          const reassignBtn = el("button", "secondary", "재지정");
          const buttons = [approveBtn, editBtn, rejectBtn, reassignBtn];
          for (const button of buttons) actions.appendChild(button);
          detailBox.appendChild(actions);

          async function submit(action) {
            if (
              generation !== approvalLoadEpoch ||
              detailRequest !== approvalDetailRequest ||
              activeApprovalDetailClose !== closeDetail
            ) return;
            const editedText = edit.input.value.trim();
            const reasonCode = reject.input.value.trim();
            const approverId = target.input.value.trim();
            if (action === "approve_with_edit" && !editedText) {
              result.className = "result error";
              result.textContent = "수정승인할 답변을 입력하세요.";
              return;
            }
            if (action === "reject" && !reasonCode) {
              result.className = "result error";
              result.textContent = "Reject 사유 코드를 입력하세요.";
              return;
            }
            if (action === "reassign" && !approverId) {
              result.className = "result error";
              result.textContent = "새 승인자 ID를 입력하세요.";
              return;
            }
            for (const button of buttons) button.disabled = true;
            result.className = "result";
            result.textContent = "처리 중…";
            try {
              if (action === "approve") {
                await postApprovalDecision(summary.item_id, { kind: "approve" });
              } else if (action === "approve_with_edit") {
                await postApprovalDecision(summary.item_id, {
                  kind: "approve_with_edit",
                  edited_text: editedText,
                });
              } else if (action === "reject") {
                await postApprovalDecision(summary.item_id, {
                  kind: "reject",
                  reason_code: reasonCode,
                });
              } else {
                await postApprovalReassignment(summary.item_id, approverId);
              }
              if (
                generation !== approvalLoadEpoch ||
                detailRequest !== approvalDetailRequest ||
                activeApprovalDetailClose !== closeDetail
              ) return;
              await loadApprovals();
            } catch (err) {
              if (
                generation !== approvalLoadEpoch ||
                detailRequest !== approvalDetailRequest ||
                activeApprovalDetailClose !== closeDetail
              ) return;
              result.className = "result error";
              result.textContent = err.message || "Approval 처리에 실패했습니다.";
              for (const button of buttons) button.disabled = false;
            }
          }

          approveBtn.addEventListener("click", () => submit("approve"));
          editBtn.addEventListener("click", () => submit("approve_with_edit"));
          rejectBtn.addEventListener("click", () => submit("reject"));
          reassignBtn.addEventListener("click", () => submit("reassign"));
          detailBox.classList.add("open");
          openBtn.textContent = "상세 닫기";
          openBtn.setAttribute("aria-expanded", "true");
          result.textContent = "";
        } catch (err) {
          if (
            generation !== approvalLoadEpoch ||
            detailRequest !== approvalDetailRequest ||
            activeApprovalDetailClose !== closeDetail
          ) return;
          result.className = "result error";
          result.textContent = err.message || "Approval 상세를 불러오지 못했습니다.";
        } finally {
          if (
            generation === approvalLoadEpoch &&
            detailRequest === approvalDetailRequest &&
            activeApprovalDetailClose === closeDetail
          ) openBtn.disabled = false;
        }
      });
      return wrap;
    }

    async function loadApprovals(generation = beginApprovalLoadGeneration()) {
      if (generation !== approvalLoadEpoch) return;
      approvalsEl.textContent = "";
      approvalsEl.appendChild(el("div", "empty", "Approval 목록을 불러오는 중…"));
      let items;
      try {
        items = await fetchApprovals();
      } catch (err) {
        if (generation !== approvalLoadEpoch) return;
        if (err.message === "401") throw err;
        approvalsEl.textContent = "";
        approvalsEl.appendChild(el("div", "empty", "Approval 목록을 불러오지 못했습니다."));
        approvalCountEl.classList.add("zero");
        return;
      }
      if (generation !== approvalLoadEpoch) return;
      approvalsEl.textContent = "";
      approvalCountEl.textContent = String(items.length);
      approvalCountEl.classList.toggle("zero", items.length === 0);
      if (!items.length) {
        approvalsEl.appendChild(el("div", "empty", "검토할 Approval 항목이 없습니다."));
        return;
      }
      items.forEach((item, index) => approvalsEl.appendChild(renderApproval(item, index)));
    }

    async function loadReviews() {
      reviewsEl.innerHTML = "";
      let items;
      try {
        items = await fetchReviews();
      } catch (err) {
        if (err.message === "401") throw err; // 세션 만료 — load()가 로그인 폼으로.
        reviewsEl.appendChild(el("div", "empty", "백업 검토 목록을 불러오지 못했습니다."));
        reviewCountEl.classList.add("zero");
        return;
      }
      reviewCountEl.textContent = String(items.length);
      reviewCountEl.classList.toggle("zero", items.length === 0);
      if (!items.length) {
        reviewsEl.appendChild(el("div", "empty", "검토할 백업 답이 없습니다."));
        return;
      }
      for (const it of items) {
        reviewsEl.appendChild(renderReview(it));
      }
    }

    async function loadCases() {
      casesEl.innerHTML = "";
      let cases;
      try {
        cases = await fetchCases();
      } catch (err) {
        if (err.message === "401") throw err; // 세션 만료 — load()가 로그인 폼으로.
        casesEl.appendChild(el("div", "empty", "처리함을 불러오지 못했습니다."));
        return;
      }
      if (!cases.length) {
        casesEl.appendChild(el("div", "empty", "처리할 다툼이 없습니다."));
        return;
      }
      for (const c of cases) {
        casesEl.appendChild(renderCase(c));
      }
    }

    async function load() {
      // 네 탭을 모두 갱신한다 — 모든 운영 처분이 같은 *세션 신원*을 본다. 세션 만료(401)면
      // 로그인 폼으로 돌아간다(서버가 신원을 강제하므로 클라이언트는 세션만 따른다).
      const approvalGeneration = beginApprovalLoadGeneration();
      try {
        await Promise.all([
          loadCases(),
          loadReviews(),
          loadReevals(),
          loadApprovals(approvalGeneration)
        ]);
      } catch (err) {
        if (err.message === "401") showLogin();
      }
    }

    function showLogin() {
      beginApprovalLoadGeneration();
      sessionUser = null;
      loginForm.style.display = "";
      identityBox.style.display = "none";
      casesEl.innerHTML = "";
      reviewsEl.innerHTML = "";
      reevalsEl.innerHTML = "";
      approvalsEl.innerHTML = "";
    }

    function showIdentity(userId) {
      beginApprovalLoadGeneration();
      sessionUser = userId;
      meNameEl.textContent = userId;
      loginForm.style.display = "none";
      identityBox.style.display = "";
    }

    async function doLogin() {
      const userId = document.getElementById("login-user").value.trim();
      if (!userId) return;
      const res = await fetch("/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ user_id: userId }),
      });
      if (!res.ok) {
        alert(
          "로그인 실패(" + res.status + ") — 등록된 user_id인지 확인하세요. " +
          "데모 기동엔 OPERATOR_SESSION_SECRET 환경변수가 필요합니다(미설정 시 인증 OFF)."
        );
        return;
      }
      showIdentity(userId);
      load();
    }

    async function doLogout() {
      await fetch("/logout", { method: "POST" });
      showLogin();
    }

    document.getElementById("login-btn").addEventListener("click", doLogin);
    document.getElementById("login-user").addEventListener("keydown", (e) => {
      if (e.key === "Enter") doLogin();
    });
    document.getElementById("logout-btn").addEventListener("click", doLogout);

    // 초기: 로그인 폼부터(가장 드롭다운 제거 — ADR 0009 기준 3). 로그인 후 자기 처리함.
    showLogin();
  </script>
</body>
</html>
