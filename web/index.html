<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>조직에 물어보기</title>
  <style>
    :root {
      --bg: #f4f5f7;
      --me: #2563eb;
      --org: #ffffff;
      --ink: #1f2933;
      --muted: #6b7280;
      --line: #e5e7eb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo",
        "Malgun Gothic", sans-serif;
      background: var(--bg);
      color: var(--ink);
      height: 100vh;
      display: flex;
      justify-content: center;
    }
    .chat {
      width: 100%;
      max-width: 640px;
      display: flex;
      flex-direction: column;
      height: 100%;
      background: var(--bg);
    }
    header {
      padding: 16px 20px;
      font-weight: 700;
      font-size: 16px;
      border-bottom: 1px solid var(--line);
      background: #fff;
    }
    header small { display: block; font-weight: 400; color: var(--muted); margin-top: 2px; }
    #log {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .row { display: flex; }
    .row.me { justify-content: flex-end; }
    .bubble {
      max-width: 78%;
      padding: 10px 14px;
      border-radius: 16px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .me .bubble { background: var(--me); color: #fff; border-bottom-right-radius: 4px; }
    .org .bubble {
      background: var(--org);
      color: var(--ink);
      border: 1px solid var(--line);
      border-bottom-left-radius: 4px;
    }
    .footer {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px dashed var(--line);
      font-size: 12px;
      color: var(--muted);
      display: flex;
      flex-wrap: wrap;
      gap: 6px 10px;
      align-items: center;
    }
    .badge {
      display: inline-block;
      padding: 1px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge.full { background: #dcfce7; color: #166534; }
    .badge.draft_only { background: #fef3c7; color: #92400e; }
    .feedback { width: 100%; display: flex; align-items: center; gap: 6px; }
    .feedback button.fb-btn {
      padding: 2px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    .feedback button.fb-btn:hover { border-color: var(--me); color: var(--me); }
    .feedback button.fb-btn.active.good { background: #dcfce7; border-color: #16a34a; color: #166534; }
    .feedback button.fb-btn.active.bad { background: #fee2e2; border-color: #dc2626; color: #b91c1c; }
    .feedback button.fb-btn:disabled { opacity: 0.6; cursor: default; }
    .feedback .fb-sent { font-size: 11px; color: var(--muted); }
    .sources { width: 100%; }
    .sources b { font-weight: 600; color: #4b5563; }
    .pending .bubble { background: #fff7ed; border-color: #fed7aa; color: #9a3412; }
    .org .bubble { animation: pop 0.18s ease-out; }
    @keyframes pop { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
    .stage {
      align-self: center;
      max-width: 92%;
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      padding: 5px 12px;
      border-radius: 999px;
      background: #eef1f5;
      border: 1px solid var(--line);
      color: var(--muted);
      animation: pop 0.18s ease-out;
    }
    .stage.active { background: #fff7ed; border-color: #fed7aa; color: #9a3412; }
    .stage.done { background: #ecfdf5; border-color: #a7f3d0; color: #047857; }
    .stage-icon { font-size: 13px; }
    .dots { display: inline-flex; gap: 3px; margin-left: 1px; }
    .dots i {
      width: 5px; height: 5px; border-radius: 50%;
      background: currentColor; animation: blink 1.2s infinite both;
    }
    .dots i:nth-child(2) { animation-delay: 0.2s; }
    .dots i:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%, 80%, 100% { opacity: 0.25; } 40% { opacity: 1; } }
    form {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      border-top: 1px solid var(--line);
      background: #fff;
    }
    input {
      flex: 1;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      font-size: 15px;
      outline: none;
    }
    input:focus { border-color: var(--me); }
    button {
      padding: 0 18px;
      border: none;
      border-radius: 999px;
      background: var(--me);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: default; }
  </style>
</head>
<body>
  <div class="chat">
    <header>
      조직에 물어보기
      <small>질문을 보내면 담당이 답합니다. 예: "이 계약 조건 바꿔도 돼?"</small>
    </header>
    <div id="log"></div>
    <form id="form">
      <input id="q" type="text" placeholder="무엇이든 물어보세요" autocomplete="off" autofocus />
      <button id="send" type="submit">보내기</button>
    </form>
  </div>

  <script>
    const log = document.getElementById("log");
    const form = document.getElementById("form");
    const input = document.getElementById("q");
    const sendBtn = document.getElementById("send");

    function el(tag, cls, text) {
      const node = document.createElement(tag);
      if (cls) node.className = cls;
      if (text != null) node.textContent = text;
      return node;
    }

    function addMe(text) {
      const row = el("div", "row me");
      const b = el("div", "bubble", text);
      row.appendChild(b);
      log.appendChild(row);
      log.scrollTop = log.scrollHeight;
    }

    function fillBubble(bubble, reply) {
      bubble.textContent = "";
      if (reply.type === "pending") {
        bubble.appendChild(el("div", null, reply.message));
        return;
      }
      bubble.appendChild(el("div", null, reply.text));

      const footer = el("div", "footer");
      footer.appendChild(el("span", null, "담당 " + reply.answered_by.agent_id));
      const modeLabel = reply.mode === "full" ? "답변 확정" : "초안";
      footer.appendChild(el("span", "badge " + reply.mode, modeLabel));

      if (reply.sources && reply.sources.length) {
        const src = el("div", "sources");
        src.appendChild(el("b", null, "출처: "));
        src.appendChild(document.createTextNode(reply.sources.join(", ")));
        footer.appendChild(src);
      }
      bubble.appendChild(footer);

      // 답변 피드백(좋음/싫음) — record_id가 있는 답에만(질문자가 답을 감독에 표출하는
      // 유일한 손잡이, 계획 §10). "싫음"은 담당자 검토 필요 축의 트리거일 뿐 정정 자체는
      // 아니다.
      if (reply.record_id) {
        bubble.appendChild(makeFeedbackRow(reply.record_id));
      }
    }

    async function submitFeedback(recordId, verdict) {
      const res = await fetch("/answer/" + encodeURIComponent(recordId) + "/feedback", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ verdict }),
      });
      if (!res.ok) throw new Error("요청 실패: " + res.status);
      return res.json();
    }

    function makeFeedbackRow(recordId) {
      const row = el("div", "feedback");
      const goodBtn = el("button", "fb-btn", "👍 좋아요");
      goodBtn.type = "button";
      const badBtn = el("button", "fb-btn", "👎 별로예요");
      badBtn.type = "button";
      const sent = el("span", "fb-sent", "");
      row.appendChild(goodBtn);
      row.appendChild(badBtn);
      row.appendChild(sent);

      async function choose(verdict, btn, otherBtn) {
        goodBtn.disabled = true;
        badBtn.disabled = true;
        try {
          await submitFeedback(recordId, verdict);
          btn.classList.add("active", verdict);
          otherBtn.classList.remove("active", "good", "bad");
          sent.textContent = "피드백 전송됨";
        } catch (_) {
          sent.textContent = "전송 실패";
        } finally {
          goodBtn.disabled = false;
          badBtn.disabled = false;
        }
      }

      goodBtn.addEventListener("click", () => choose("good", goodBtn, badBtn));
      badBtn.addEventListener("click", () => choose("bad", badBtn, goodBtn));
      return row;
    }

    function addOrg(reply) {
      const isPending = reply.type === "pending";
      const row = el("div", "row org" + (isPending ? " pending" : ""));
      const bubble = el("div", "bubble");
      fillBubble(bubble, reply);
      row.appendChild(bubble);
      log.appendChild(row);
      log.scrollTop = log.scrollHeight;
      return { row, bubble };
    }

    // dispatched(워커) 답은 즉답이 아니라 워커가 나중에 회신한다 — tracking으로 폴링해
    // 준비되면 Answer를 돌려준다(미아 없음: 안 와도 처리함은 그대로). 진행 표시는 stage가 맡는다.
    async function pollForAnswer(tracking) {
      for (let i = 0; i < 90; i++) {
        await new Promise((r) => setTimeout(r, 2000));
        let data;
        try {
          const res = await fetch("/ask/" + encodeURIComponent(tracking));
          if (!res.ok) continue;
          data = await res.json();
        } catch (_) {
          continue;
        }
        if (data.type === "answered") return data;
      }
      return null;
    }

    // 진행 단계 표시줄 — 보내는 즉시 "담당을 찾는 중"을 띄우고, 디스패치되면 "전달됨·작성 중"
    // (경과 초)으로, 답이 오면 "담당이 답했어요"로 정착시킨다. 노출 불변식: 단계 라벨만 —
    // 어떤 담당인지는 답(answered_by)에서만 드러난다.
    function makeStage() {
      const node = el("div", "stage active");
      const icon = el("span", "stage-icon", "🔎");
      const label = el("span", "stage-label", "담당을 찾는 중");
      const dots = el("span", "dots");
      dots.appendChild(el("i"));
      dots.appendChild(el("i"));
      dots.appendChild(el("i"));
      node.appendChild(icon);
      node.appendChild(label);
      node.appendChild(dots);
      log.appendChild(node);
      log.scrollTop = log.scrollHeight;

      let timer = null;
      const start = Date.now();
      return {
        dispatched() {
          icon.textContent = "📨";
          label.textContent = "담당에게 전달됨 · 답변 작성 중";
          if (timer) clearInterval(timer);
          timer = setInterval(() => {
            const s = Math.floor((Date.now() - start) / 1000);
            label.textContent = "담당에게 전달됨 · 답변 작성 중 (" + s + "초)";
          }, 1000);
        },
        done(text) {
          if (timer) clearInterval(timer);
          node.className = "stage done";
          icon.textContent = "✓";
          dots.remove();
          label.textContent = text || "완료";
        },
        fail(text) {
          if (timer) clearInterval(timer);
          node.className = "stage";
          icon.textContent = "⚠️";
          dots.remove();
          label.textContent = text || "응답을 받지 못했어요";
        },
      };
    }

    async function ask(question) {
      const res = await fetch("/ask", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ question }),
      });
      if (!res.ok) throw new Error("요청 실패: " + res.status);
      return res.json();
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const question = input.value.trim();
      if (!question) return;
      addMe(question);
      input.value = "";
      sendBtn.disabled = true;

      const stage = makeStage(); // ① 보내는 즉시 "담당을 찾는 중…"
      let reply;
      try {
        reply = await ask(question);
      } catch (err) {
        stage.fail("지금은 답할 수 없어요 — 잠시 후 다시 시도해 주세요");
        sendBtn.disabled = false;
        input.focus();
        return;
      }
      // POST가 끝나면(라우팅·디스패치 완료) 바로 다음 질문을 받을 수 있게 풀어준다.
      sendBtn.disabled = false;
      input.focus();

      if (reply.type === "answered") {
        stage.done("담당이 답했어요");
        addOrg(reply);
      } else if (reply.type === "pending" && reply.tracking) {
        stage.dispatched(); // ② "담당에게 전달됨 · 답변 작성 중 (n초)"
        const answer = await pollForAnswer(reply.tracking);
        if (answer) {
          stage.done("담당이 답했어요"); // ③ 정착
          addOrg(answer); // 답은 별도 말풍선으로
        } else {
          stage.fail("아직 답을 받지 못했어요 — 담당 워커가 처리 중이거나 미연결");
        }
      } else {
        // escalation·contested 등 — 단계는 끝났고 안내 메시지를 말풍선으로 보여준다.
        stage.done("확인됨");
        addOrg(reply);
      }
    });
  </script>
</body>
</html>
