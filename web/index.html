<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>조직에 물어보기</title>
  <style>
    :root {
      --bg: #f4f5f7;
      --me: #2563eb;
      --org: #ffffff;
      --ink: #1f2933;
      --muted: #6b7280;
      --line: #e5e7eb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo",
        "Malgun Gothic", sans-serif;
      background: var(--bg);
      color: var(--ink);
      height: 100vh;
      display: flex;
      justify-content: center;
    }
    .chat {
      width: 100%;
      max-width: 640px;
      display: flex;
      flex-direction: column;
      height: 100%;
      background: var(--bg);
    }
    header {
      padding: 16px 20px;
      font-weight: 700;
      font-size: 16px;
      border-bottom: 1px solid var(--line);
      background: #fff;
    }
    header small { display: block; font-weight: 400; color: var(--muted); margin-top: 2px; }
    #log {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .row { display: flex; }
    .row.me { justify-content: flex-end; }
    .bubble {
      max-width: 78%;
      padding: 10px 14px;
      border-radius: 16px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .me .bubble { background: var(--me); color: #fff; border-bottom-right-radius: 4px; }
    .org .bubble {
      background: var(--org);
      color: var(--ink);
      border: 1px solid var(--line);
      border-bottom-left-radius: 4px;
    }
    .footer {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px dashed var(--line);
      font-size: 12px;
      color: var(--muted);
      display: flex;
      flex-wrap: wrap;
      gap: 6px 10px;
      align-items: center;
    }
    .badge {
      display: inline-block;
      padding: 1px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge.full { background: #dcfce7; color: #166534; }
    .badge.draft_only { background: #fef3c7; color: #92400e; }
    .sources { width: 100%; }
    .sources b { font-weight: 600; color: #4b5563; }
    .pending .bubble { background: #fff7ed; border-color: #fed7aa; color: #9a3412; }
    form {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      border-top: 1px solid var(--line);
      background: #fff;
    }
    input {
      flex: 1;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      font-size: 15px;
      outline: none;
    }
    input:focus { border-color: var(--me); }
    button {
      padding: 0 18px;
      border: none;
      border-radius: 999px;
      background: var(--me);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: default; }
  </style>
</head>
<body>
  <div class="chat">
    <header>
      조직에 물어보기
      <small>질문을 보내면 담당이 답합니다. 예: "이 계약 조건 바꿔도 돼?"</small>
    </header>
    <div id="log"></div>
    <form id="form">
      <input id="q" type="text" placeholder="무엇이든 물어보세요" autocomplete="off" autofocus />
      <button id="send" type="submit">보내기</button>
    </form>
  </div>

  <script>
    const log = document.getElementById("log");
    const form = document.getElementById("form");
    const input = document.getElementById("q");
    const sendBtn = document.getElementById("send");

    function el(tag, cls, text) {
      const node = document.createElement(tag);
      if (cls) node.className = cls;
      if (text != null) node.textContent = text;
      return node;
    }

    function addMe(text) {
      const row = el("div", "row me");
      const b = el("div", "bubble", text);
      row.appendChild(b);
      log.appendChild(row);
      log.scrollTop = log.scrollHeight;
    }

    function addOrg(reply) {
      const isPending = reply.type === "pending";
      const row = el("div", "row org" + (isPending ? " pending" : ""));
      const bubble = el("div", "bubble");

      if (isPending) {
        bubble.appendChild(el("div", null, reply.message));
        row.appendChild(bubble);
        log.appendChild(row);
        log.scrollTop = log.scrollHeight;
        return;
      }

      bubble.appendChild(el("div", null, reply.text));

      const footer = el("div", "footer");
      footer.appendChild(el("span", null, "담당 " + reply.answered_by.agent_id));
      const modeLabel = reply.mode === "full" ? "답변 확정" : "초안";
      footer.appendChild(el("span", "badge " + reply.mode, modeLabel));

      if (reply.sources && reply.sources.length) {
        const src = el("div", "sources");
        src.appendChild(el("b", null, "출처: "));
        src.appendChild(document.createTextNode(reply.sources.join(", ")));
        footer.appendChild(src);
      }
      bubble.appendChild(footer);

      row.appendChild(bubble);
      log.appendChild(row);
      log.scrollTop = log.scrollHeight;
    }

    async function ask(question) {
      const res = await fetch("/ask", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ question }),
      });
      if (!res.ok) throw new Error("요청 실패: " + res.status);
      return res.json();
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const question = input.value.trim();
      if (!question) return;
      addMe(question);
      input.value = "";
      sendBtn.disabled = true;
      try {
        const reply = await ask(question);
        addOrg(reply);
      } catch (err) {
        addOrg({ type: "pending", kind: "error", message: "지금은 답할 수 없어요. 잠시 후 다시 시도해 주세요." });
      } finally {
        sendBtn.disabled = false;
        input.focus();
      }
    });
  </script>
</body>
</html>
