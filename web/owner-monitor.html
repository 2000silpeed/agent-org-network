<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>답변 감독 — 담당자 모니터링(로컬)</title>
  <style>
    :root {
      --bg: #f4f5f7;
      --me: #2563eb;
      --org: #ffffff;
      --ink: #1f2933;
      --muted: #6b7280;
      --line: #e5e7eb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo",
        "Malgun Gothic", sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }
    .inbox {
      width: 100%;
      max-width: 680px;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      background: var(--bg);
    }
    header {
      padding: 16px 20px;
      font-weight: 700;
      font-size: 16px;
      border-bottom: 1px solid var(--line);
      background: #fff;
    }
    header small { display: block; font-weight: 400; color: var(--muted); margin-top: 2px; }
    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 20px;
      background: #fff;
      border-bottom: 1px solid var(--line);
      flex-wrap: wrap;
    }
    .controls label { font-size: 13px; color: var(--muted); }
    .controls input[type="text"] {
      padding: 7px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
    }
    .controls input[type="text"]:focus { border-color: var(--me); }
    .controls .filter { display: flex; align-items: center; gap: 5px; margin-left: auto; }
    .presence {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 999px;
      background: #f3f4f6;
      color: var(--muted);
    }
    .presence .dot { width: 8px; height: 8px; border-radius: 999px; background: #9ca3af; }
    .presence.online { background: #dcfce7; color: #166534; }
    .presence.online .dot { background: #16a34a; }
    .presence.offline { background: #fee2e2; color: #b91c1c; }
    .presence.offline .dot { background: #dc2626; }
    #answers {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .empty { color: var(--muted); font-size: 14px; text-align: center; padding: 32px 16px; }
    .case {
      background: var(--org);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .case .meta { font-size: 12px; color: var(--muted); }
    .badge {
      display: inline-block;
      align-self: flex-start;
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
    }
    .badge.review { background: #fef3c7; color: #92400e; }
    .badge.corrected { background: #dbeafe; color: #1e40af; }
    .badge.feedback-good { background: #dcfce7; color: #166534; }
    .badge.feedback-bad { background: #fee2e2; color: #b91c1c; }
    .label { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .question, .answer {
      font-size: 15px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .answer { background: #f9fafb; border-radius: 10px; padding: 10px 12px; }
    .history { border-top: 1px dashed var(--line); padding-top: 8px; }
    .history .item { font-size: 13px; color: var(--ink); margin-bottom: 6px; }
    .history .item .when { color: var(--muted); font-size: 11px; }
    textarea.correct-text {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 10px;
      font-size: 14px;
      line-height: 1.55;
      font-family: inherit;
      outline: none;
      resize: vertical;
      min-height: 72px;
      background: #fff;
    }
    textarea.correct-text:focus { border-color: var(--me); }
    input.rationale {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: 10px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
    }
    .actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    button {
      padding: 9px 18px;
      border: none;
      border-radius: 999px;
      background: var(--me);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: default; }
    .result { font-size: 13px; font-weight: 600; }
    .result.sent { color: #166534; }
    .result.error { color: #b91c1c; }
    .foot { padding: 12px 20px; font-size: 12px; color: var(--muted); }
    .tabs { display: flex; gap: 4px; padding: 0 20px; background: #fff; border-bottom: 1px solid var(--line); }
    .tab {
      padding: 10px 14px; font-size: 13px; font-weight: 600; color: var(--muted);
      background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer;
    }
    .tab.active { color: var(--me); border-bottom-color: var(--me); }
    .panel { display: none; }
    .panel.active { display: flex; flex-direction: column; }
    #scorecard-panel { flex: 1; overflow-y: auto; padding: 16px 20px; }
    .sc-notice {
      background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 8px;
      padding: 12px 16px; font-size: 12px; color: #1e40af; margin-bottom: 16px;
    }
    .sc-controls { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
    .sc-controls input[type="number"] {
      width: 70px; padding: 6px 8px; border: 1px solid var(--line); border-radius: 6px; font-size: 13px;
    }
    .sc-axes { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .sc-axis { background: #fff; border: 1px solid var(--line); border-radius: 10px; padding: 12px 14px; }
    .sc-axis .name { font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 4px; }
    .sc-axis .value { font-size: 14px; color: var(--ink); }
    .sc-axis .trend { margin-left: 6px; font-weight: 700; }
    .sc-axis .trend.up { color: #166534; }
    .sc-axis .trend.down { color: #b91c1c; }
    .sc-axis .trend.flat { color: var(--muted); }
    .sc-note { font-size: 11px; color: var(--muted); margin-top: 10px; }
  </style>
</head>
<body>
  <div class="inbox">
    <header>
      답변 감독
      <small>내 에이전트에 들어온 질문·나간 답을 열람하고, 잘못된 답을 정정한다(로컬).</small>
    </header>
    <div class="tabs">
      <button class="tab active" id="tab-answers" data-panel="panel-answers">답변 감독</button>
      <button class="tab" id="tab-scorecard" data-panel="panel-scorecard">내 성적</button>
    </div>

    <div class="panel active" id="panel-answers" style="flex:1; min-height:0; display:flex; flex-direction:column;">
      <div class="controls">
        <label for="agent-id">에이전트</label>
        <input type="text" id="agent-id" placeholder="예: contract_ops" />
        <span class="presence" id="presence"><span class="dot"></span><span id="presence-text">—</span></span>
        <span class="filter">
          <input type="checkbox" id="needs-review" />
          <label for="needs-review">검토 필요만</label>
        </span>
      </div>
      <div id="answers"></div>
      <div class="foot">
        이 화면은 내 PC 로컬(127.0.0.1)에서만 열린다. 정정은 원 답을 지우지 않고 새 정정으로 쌓인다.
        질문자는 자기 답변 페이지에서 정정 배지로 정정본을 본다(풀 방식).
      </div>
    </div>

    <div class="panel" id="panel-scorecard">
      <div id="scorecard-panel">
        <div class="sc-notice">
          <strong>관찰 도구입니다 — 순위표가 아닙니다.</strong> 정정은 감독의 증거로 가점 축이고,
          품질 저하 신호는 싫음 피드백에서만 읽습니다. 아래 화살표는 <strong>내 직전 동일 기간
          대비 변화</strong>일 뿐, 다른 담당자와 비교하는 값이 아닙니다.
        </div>
        <div class="sc-controls">
          <label for="sc-owner-id">담당자(owner_id)</label>
          <input type="text" id="sc-owner-id" placeholder="예: cs_lead" />
          <label for="sc-days">기간(일)</label>
          <input type="number" id="sc-days" min="1" value="30" />
          <button id="sc-load-btn">조회</button>
        </div>
        <div id="sc-result"></div>
      </div>
    </div>
  </div>

  <script>
    const answersEl = document.getElementById("answers");
    const agentInput = document.getElementById("agent-id");
    const needsReviewEl = document.getElementById("needs-review");
    const presenceEl = document.getElementById("presence");
    const presenceTextEl = document.getElementById("presence-text");

    function el(tag, cls, text) {
      const node = document.createElement(tag);
      if (cls) node.className = cls;
      if (text != null) node.textContent = text;
      return node;
    }

    function fmtTime(iso) {
      if (!iso) return "";
      const d = new Date(iso);
      return isNaN(d) ? iso : d.toLocaleString();
    }

    function currentAgent() {
      return agentInput.value.trim();
    }

    async function fetchAnswers(agentId, needsReview) {
      const q = new URLSearchParams({ agent_id: agentId });
      if (needsReview) q.set("needs_review", "true");
      const res = await fetch("/supervision/answers?" + q.toString());
      if (!res.ok) throw new Error("요청 실패: " + res.status);
      return res.json();
    }

    async function fetchPresence(agentId) {
      const res = await fetch("/supervision/presence/" + encodeURIComponent(agentId));
      if (!res.ok) throw new Error("요청 실패: " + res.status);
      return res.json();
    }

    async function postCorrection(recordId, body) {
      const res = await fetch(
        "/supervision/answers/" + encodeURIComponent(recordId) + "/correct",
        {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        }
      );
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        const msg = data && data.detail ? data.detail : "요청 실패: " + res.status;
        throw new Error(msg);
      }
      return data;
    }

    function renderPresence(status) {
      presenceEl.className = "presence " + (status || "");
      presenceTextEl.textContent =
        status === "online" ? "워커 온라인" : status === "offline" ? "워커 오프라인" : "—";
    }

    function renderAnswer(a) {
      const wrap = el("div", "case");
      wrap.appendChild(el("div", "meta", a.agent_id + " · " + a.mode + " · " + fmtTime(a.answered_at)));
      if (a.needs_correction_review) wrap.appendChild(el("span", "badge review", "검토 필요"));
      if (a.corrections && a.corrections.length) {
        wrap.appendChild(el("span", "badge corrected", "정정됨 " + a.corrections.length));
      }
      if (a.feedback) {
        const isBad = a.feedback.verdict === "bad";
        const fbBadge = el(
          "span",
          "badge " + (isBad ? "feedback-bad" : "feedback-good"),
          (isBad ? "싫음" : "좋음") + " 피드백"
        );
        wrap.appendChild(fbBadge);
      }

      wrap.appendChild(el("div", "label", "질문"));
      wrap.appendChild(el("div", "question", a.question));
      wrap.appendChild(el("div", "label", "나간 답"));
      wrap.appendChild(el("div", "answer", a.answer_text));

      if (a.corrections && a.corrections.length) {
        const hist = el("div", "history");
        hist.appendChild(el("div", "label", "정정 이력"));
        for (const c of a.corrections) {
          const item = el("div", "item");
          item.appendChild(el("span", null, c.corrected_text));
          const meta = el("span", "when", "  — " + (c.by_owner || "") + " · " + fmtTime(c.corrected_at));
          if (c.rationale) meta.textContent += " · " + c.rationale;
          item.appendChild(meta);
          hist.appendChild(item);
        }
        wrap.appendChild(hist);
      }

      if (a.feedback && a.feedback.comment) {
        const fbHist = el("div", "history");
        fbHist.appendChild(el("div", "label", "질문자 피드백 코멘트"));
        const fbItem = el("div", "item");
        fbItem.appendChild(el("span", null, a.feedback.comment));
        fbItem.appendChild(el("span", "when", "  — " + fmtTime(a.feedback.submitted_at)));
        fbHist.appendChild(fbItem);
        wrap.appendChild(fbHist);
      }

      wrap.appendChild(el("div", "label", "정정하기 (원 답은 지우지 않고 새 정정으로 쌓임)"));
      const correctText = el("textarea", "correct-text");
      correctText.defaultValue = ""; // 편집 중 판정 기준(value !== defaultValue)
      correctText.placeholder = "정정본을 입력하세요";
      wrap.appendChild(correctText);
      const rationale = el("input", "rationale");
      rationale.type = "text";
      rationale.defaultValue = "";
      rationale.placeholder = "정정 사유(선택)";
      wrap.appendChild(rationale);

      const result = el("div", "result");
      const actions = el("div", "actions");
      const submitBtn = el("button", null, "정정 전송");
      actions.appendChild(submitBtn);
      actions.appendChild(result);
      wrap.appendChild(actions);

      submitBtn.addEventListener("click", async () => {
        const text = correctText.value.trim();
        if (!text) {
          result.className = "result error";
          result.textContent = "정정본이 비어 있습니다.";
          return;
        }
        submitBtn.disabled = true;
        try {
          // by_owner는 원칙적으로 보내지 않는다 — 세션 인증이 활성인 배포에서는 서버가
          // 로그인 세션 신원으로 판정한다(현재 카드 owner 대조, ADR 0034 결정 3). 과거
          // 답변자(a.answered_by)를 하드코딩해 보내면 오너 변경 후 새 owner가 여기서
          // 정정할 때 403이 나던 결함(code-reviewer M-1) — 그래서 여전히 안 보낸다.
          //
          // 단, no-auth 배포(세션 미들웨어 미부착)는 서버가 세션을 못 읽으므로 body의
          // by_owner를 폴백으로 읽는다(web.py `_auth_enabled` 분기). a.current_owner는
          // 서버가 그때그때 registry에서 조회한 *현재* 카드 owner라 하드코딩이 아니다 —
          // 이 값이 없으면(auth 활성 배포) 빈 문자열을 보내 기존 동작 그대로 유지한다
          // (auth 활성이면 서버가 세션으로 덮어쓰므로 이 필드는 어차피 무시됨. 크로스머신
          // 재시연 실결함 5-b).
          await postCorrection(a.record_id, {
            by_owner: a.current_owner || "",
            corrected_text: text,
            rationale: rationale.value.trim(),
          });
          result.className = "result sent";
          result.textContent = "정정 전송 완료 — 재조회합니다.";
          correctText.value = "";
          rationale.value = "";
          setTimeout(load, 800);
        } catch (err) {
          result.className = "result error";
          result.textContent = err.message || "전송 실패";
          submitBtn.disabled = false;
        }
      });

      return wrap;
    }

    function isEditing() {
      // 폴링 리렌더가 작성 중인 정정을 날리지 않게 하는 가드(크로스머신 시연에서 실증된 결함).
      // ① 입력 요소에 포커스가 있거나 ② 아직 전송하지 않은 정정 내용(value !== defaultValue)이
      // 남아 있으면 이번 폴링 주기는 화면을 갈아엎지 않는다.
      const a = document.activeElement;
      if (a && (a.tagName === "TEXTAREA" || a.tagName === "INPUT") && answersEl.contains(a)) {
        return true;
      }
      for (const node of answersEl.querySelectorAll("textarea, input")) {
        if (node.value !== node.defaultValue) return true;
      }
      return false;
    }

    async function load() {
      const agentId = currentAgent();
      if (!agentId) {
        answersEl.innerHTML = "";
        answersEl.appendChild(el("div", "empty", "위에서 감독할 에이전트 ID를 입력하세요."));
        renderPresence(null);
        return;
      }
      if (isEditing()) return;

      try {
        renderPresence((await fetchPresence(agentId)).status);
      } catch (_) {
        renderPresence(null);
      }

      let answers;
      try {
        answers = await fetchAnswers(agentId, needsReviewEl.checked);
      } catch (err) {
        answersEl.innerHTML = "";
        answersEl.appendChild(el("div", "empty", "목록을 불러오지 못했습니다."));
        return;
      }
      answersEl.innerHTML = "";
      if (!answers.length) {
        answersEl.appendChild(
          el("div", "empty", needsReviewEl.checked ? "검토 필요한 답이 없습니다." : "답 이력이 없습니다.")
        );
        return;
      }
      for (const a of answers) answersEl.appendChild(renderAnswer(a));
    }

    agentInput.addEventListener("input", () => setTimeout(load, 200));
    needsReviewEl.addEventListener("change", load);

    // 간단 폴링 — 새 답/정정이 다음 주기에 반영된다(작성 중이면 isEditing 가드가 스킵).
    load();
    setInterval(load, 4000);

    // ── 내 성적 (Phase 13 SC3·ADR 0035) ──────────────────────────────────────
    // owner_id 스코핑 — 자기 성적만 조회한다(순위·타 owner 비교 없음).

    function switchTab(panelId) {
      for (const t of document.querySelectorAll(".tab")) {
        t.classList.toggle("active", t.dataset.panel === panelId);
      }
      for (const p of document.querySelectorAll(".panel")) {
        p.classList.toggle("active", p.id === panelId);
      }
    }

    function fmtPct(v) {
      return v == null ? "데이터 없음" : (v * 100).toFixed(1) + "%";
    }

    function fmtSeconds(v) {
      if (v == null) return "데이터 없음";
      if (v < 60) return v.toFixed(0) + "초";
      if (v < 3600) return (v / 60).toFixed(1) + "분";
      return (v / 3600).toFixed(1) + "시간";
    }

    function trendArrow(delta, positiveIsGood) {
      if (delta == null) return "";
      const flat = Math.abs(delta) < 1e-9;
      const up = delta > 0;
      const good = flat ? null : (positiveIsGood ? up : !up);
      const cls = flat ? "flat" : (good ? "up" : "down");
      const arrow = flat ? "→" : (up ? "↑" : "↓");
      return el("span", "trend " + cls, arrow);
    }

    function scAxis(name, value, trendEl) {
      const div = el("div", "sc-axis");
      div.appendChild(el("div", "name", name));
      const valueEl = el("div", "value", value);
      if (trendEl) valueEl.appendChild(trendEl);
      div.appendChild(valueEl);
      return div;
    }

    async function loadScorecard() {
      const resultEl = document.getElementById("sc-result");
      const ownerId = document.getElementById("sc-owner-id").value.trim();
      const days = document.getElementById("sc-days").value.trim();
      resultEl.innerHTML = "";
      if (!ownerId) {
        resultEl.appendChild(el("div", "empty", "위에서 담당자 owner_id를 입력하세요."));
        return;
      }
      const q = new URLSearchParams({ owner_id: ownerId });
      if (days) q.set("days", days);
      try {
        const res = await fetch("/supervision/scorecard?" + q.toString());
        if (!res.ok) throw new Error("요청 실패: " + res.status);
        const sc = await res.json();
        const t = sc.trend || {};
        const axes = el("div", "sc-axes");
        axes.appendChild(scAxis(
          "답변 품질 (bad 피드백률)",
          fmtPct(sc.quality.bad_feedback_rate) + " · 전체 " + sc.quality.total_answers + "건",
          trendArrow(t.quality_bad_feedback_rate_delta, false)
        ));
        axes.appendChild(scAxis(
          "감독 성실도 (처리율)",
          fmtPct(sc.supervision.handled_rate) + " · 소요 " + fmtSeconds(sc.supervision.median_handle_seconds),
          trendArrow(t.supervision_handled_rate_delta, true)
        ));
        axes.appendChild(scAxis(
          "가용성 (온라인 비율)",
          fmtPct(sc.availability.online_ratio) + " · 사전검토 " + sc.availability.presend_review_count + "건",
          null
        ));
        axes.appendChild(scAxis(
          "지식 신선도 (stale 비율)",
          fmtPct(sc.freshness.stale_ratio) + " · 카드 " + sc.freshness.total_cards + "개",
          trendArrow(t.freshness_stale_ratio_delta, false)
        ));
        resultEl.appendChild(axes);
        if (sc.weak_identity_note) {
          resultEl.appendChild(el("div", "sc-note", "약신원 참고치 — bad 피드백률은 실 SSO 전 쿠키 약신원 기반입니다."));
        }
      } catch (err) {
        resultEl.appendChild(el("div", "empty", "불러오지 못했습니다: " + err.message));
      }
    }

    document.getElementById("tab-answers").addEventListener("click", () => switchTab("panel-answers"));
    document.getElementById("tab-scorecard").addEventListener("click", () => {
      switchTab("panel-scorecard");
      loadScorecard();
    });
    document.getElementById("sc-load-btn").addEventListener("click", loadScorecard);
  </script>
</body>
</html>
